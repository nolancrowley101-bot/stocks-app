server {
  listen 80;
  server_name stocks-services.com www.stocks-services.com;
  client_max_body_size 2m;

  # Serve desktop app installers directly from disk (uploaded by CI).
  # Files persist across Next.js redeploys.
  location /downloads/ {
    alias /srv/stocks-downloads/;
    autoindex off;
    add_header Cache-Control "public, max-age=300";
    types {
      application/octet-stream exe dmg AppImage deb;
      text/plain SHA256SUMS;
    }
    default_type application/octet-stream;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
